name: Build and Push Container Image

on:
  push:
    branches: [ main, dev ]
    tags: [ '*' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set ref name (branch or tag)
      id: vars
      run: echo "REF_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: |
        echo "Building image with tag: ${REF_NAME}"
        docker build -f ovndebian-containerfile \
          -t ghcr.io/${{ github.repository }}:${REF_NAME} .

    - name: Push Docker image to GHCR
      run: |
        docker push ghcr.io/${{ github.repository }}:${REF_NAME}
